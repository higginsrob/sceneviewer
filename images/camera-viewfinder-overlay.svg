<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 920" fill="none" aria-hidden="true">
  <!--
    Portrait Hasselblad-style overlay.
    Transparent outside the body and inside the viewfinder hole.
    Hole (keep in sync with VF_* in index.html): x=140 y=168 w=420 h=420
  -->
  <defs>
    <mask id="body-mask">
      <rect width="700" height="920" fill="black"/>
      <!-- Main chassis (centered; no advance knob / side pins) -->
      <rect x="90" y="140" width="520" height="700" rx="64" fill="white"/>
      <!-- Lens barrel footprint -->
      <rect x="240" y="16" width="220" height="140" rx="6" fill="white"/>
      <!-- Transparent viewfinder -->
      <rect x="140" y="168" width="420" height="420" rx="6" fill="black"/>
    </mask>

    <!-- Dark gunmetal / black metal -->
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a3a3c"/>
      <stop offset="35%" stop-color="#1e1e20"/>
      <stop offset="55%" stop-color="#2c2c2e"/>
      <stop offset="80%" stop-color="#141416"/>
      <stop offset="100%" stop-color="#262628"/>
    </linearGradient>
    <linearGradient id="metal-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3c3c3e"/>
      <stop offset="40%" stop-color="#222224"/>
      <stop offset="100%" stop-color="#101012"/>
    </linearGradient>
    <linearGradient id="cyl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="22%" stop-color="#2a2a2c"/>
      <stop offset="48%" stop-color="#4a4a4c"/>
      <stop offset="72%" stop-color="#222224"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="cyl-mid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="25%" stop-color="#1c1c1e"/>
      <stop offset="50%" stop-color="#38383a"/>
      <stop offset="75%" stop-color="#18181a"/>
      <stop offset="100%" stop-color="#040404"/>
    </linearGradient>
    <linearGradient id="ring-face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3c"/>
      <stop offset="55%" stop-color="#1a1a1c"/>
      <stop offset="100%" stop-color="#0c0c0e"/>
    </linearGradient>
    <!-- Dark plastic body -->
    <linearGradient id="body-face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2c"/>
      <stop offset="45%" stop-color="#1a1a1c"/>
      <stop offset="100%" stop-color="#0e0e10"/>
    </linearGradient>
    <linearGradient id="body-edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="15%" stop-color="#242426"/>
      <stop offset="50%" stop-color="#343436"/>
      <stop offset="85%" stop-color="#1e1e20"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="hood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="hood-side" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="100%" stop-color="#161616"/>
    </linearGradient>
    <radialGradient id="btn" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#3a3a3c"/>
      <stop offset="100%" stop-color="#121214"/>
    </radialGradient>
    <filter id="shadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <pattern id="leather" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#121212"/>
      <circle cx="1" cy="1.2" r="0.45" fill="#1a1a1a"/>
      <circle cx="2.8" cy="2.6" r="0.4" fill="#161616"/>
      <circle cx="1.6" cy="3.2" r="0.3" fill="#1e1e1e"/>
    </pattern>
    <pattern id="knurl-s" width="2.5" height="5" patternUnits="userSpaceOnUse">
      <rect width="1.1" height="5" fill="#2e2e30"/>
      <rect x="1.1" width="1.4" height="5" fill="#0c0c0e"/>
    </pattern>
  </defs>

  <g mask="url(#body-mask)" filter="url(#shadow)">
    <!-- ===== CHASSIS ===== -->
    <rect x="90" y="140" width="520" height="700" rx="64" fill="url(#body-edge)" stroke="#050505" stroke-width="3"/>
    <rect x="104" y="152" width="492" height="676" rx="54" fill="url(#body-face)" stroke="#222" stroke-width="1.25"/>

    <!-- Upper metal deck -->
    <rect x="118" y="164" width="464" height="440" rx="24" fill="url(#metal-v)" stroke="#111" stroke-width="1.5"/>
    <!-- Side leatherette strips -->
    <rect x="118" y="164" width="30" height="440" rx="8" fill="url(#leather)" stroke="#0a0a0a" stroke-width="1"/>
    <rect x="552" y="164" width="30" height="440" rx="8" fill="url(#leather)" stroke="#0a0a0a" stroke-width="1"/>

    <!-- Small top plate with D / H -->
    <rect x="270" y="152" width="160" height="22" rx="4" fill="url(#metal)" stroke="#0a0a0a" stroke-width="1.25"/>
    <rect x="288" y="158" width="14" height="8" rx="1" fill="#c0392b"/>
    <rect x="398" y="158" width="14" height="8" rx="1" fill="#c0392b"/>
    <text x="315" y="168" fill="#bbb" font-family="ui-monospace, Menlo, monospace" font-size="9" font-weight="700">D</text>
    <text x="378" y="168" fill="#bbb" font-family="ui-monospace, Menlo, monospace" font-size="9" font-weight="700">H</text>

    <!-- ===== LENS: shorter rectangular side profile ===== -->
    <g transform="translate(350 16)">
      <rect x="-110" y="0" width="220" height="138" rx="4" fill="url(#cyl)" stroke="#000" stroke-width="2.5"/>
      <rect x="-78" y="2" width="22" height="134" fill="#fff" opacity="0.06"/>
      <rect x="52" y="2" width="10" height="134" fill="#000" opacity="0.18"/>

      <!-- Tip edge -->
      <rect x="-110" y="0" width="220" height="10" fill="url(#cyl-mid)" stroke="#000" stroke-width="1.5"/>

      <!-- Shutter-speed ring -->
      <rect x="-110" y="10" width="220" height="26" fill="url(#cyl-mid)" stroke="#000" stroke-width="1.25"/>
      <g fill="#c8c8c6" font-family="ui-monospace, Menlo, monospace" font-size="8" text-anchor="middle">
        <text x="-78" y="27">B</text>
        <text x="-48" y="27">1</text>
        <text x="-18" y="27">4</text>
        <text x="14" y="27">15</text>
        <text x="46" y="27">60</text>
        <text x="78" y="27">250</text>
      </g>
      <line x1="-78" y1="15" x2="-78" y2="10" stroke="#c0392b" stroke-width="2"/>

      <!-- Aperture ring -->
      <rect x="-110" y="36" width="220" height="24" fill="url(#cyl)" stroke="#000" stroke-width="1.25"/>
      <g fill="#c8c8c6" font-family="ui-monospace, Menlo, monospace" font-size="8" text-anchor="middle">
        <text x="-78" y="52">22</text>
        <text x="-40" y="52">11</text>
        <text x="0" y="52">5.6</text>
        <text x="42" y="52">2.8</text>
        <text x="80" y="52">2</text>
      </g>
      <rect x="-6" y="42" width="7" height="3.5" rx="0.5" fill="#c0392b"/>
      <rect x="5" y="42" width="11" height="3.5" rx="0.5" fill="#27ae60"/>

      <!-- Distance ring -->
      <rect x="-110" y="60" width="220" height="22" fill="url(#cyl-mid)" stroke="#000" stroke-width="1.25"/>
      <g font-family="ui-monospace, Menlo, monospace" font-size="7.5" text-anchor="middle">
        <text x="-78" y="75" fill="#2ecc71">3</text>
        <text x="-40" y="75" fill="#bbb">5</text>
        <text x="0" y="75" fill="#bbb">10</text>
        <text x="40" y="75" fill="#bbb">30</text>
        <text x="78" y="75" fill="#c0392b">∞</text>
      </g>

      <!-- Knurled focus ring -->
      <rect x="-110" y="82" width="220" height="28" fill="url(#knurl-s)" stroke="#000" stroke-width="1.5"/>
      <rect x="-110" y="82" width="220" height="28" fill="url(#cyl)" opacity="0.35"/>

      <!-- Mount into body -->
      <rect x="-110" y="110" width="220" height="28" fill="url(#cyl-mid)" stroke="#000" stroke-width="1.5"/>
      <line x1="-100" y1="120" x2="100" y2="120" stroke="#444" stroke-width="1" opacity="0.4"/>
      <line x1="-100" y1="130" x2="100" y2="130" stroke="#666" stroke-width="1" opacity="0.25"/>
    </g>

    <!-- ===== VIEWFINDER HOOD ===== -->
    <rect x="124" y="156" width="452" height="452" rx="10" fill="url(#metal)" stroke="#000" stroke-width="2.5"/>
    <rect x="134" y="166" width="432" height="432" rx="8" fill="#0a0a0a" stroke="#000" stroke-width="1.5"/>
    <!-- Inner hood walls -->
    <path d="M134 166 H566 L550 186 H150 Z" fill="url(#hood)"/>
    <path d="M134 166 V598 L150 580 V186 Z" fill="url(#hood-side)"/>
    <path d="M566 166 V598 L550 580 V186 Z" fill="#1a1a1a"/>
    <path d="M134 598 H566 L550 580 H150 Z" fill="#050505"/>
    <!-- Inner lip -->
    <rect x="146" y="180" width="408" height="408" rx="4" fill="none" stroke="#555" stroke-width="1.5" opacity="0.65"/>
    <rect x="146" y="180" width="408" height="408" rx="4" fill="none" stroke="#000" stroke-width="1"/>

    <!-- Hood hinge / flap cue at top of finder -->
    <rect x="242" y="152" width="216" height="12" rx="3" fill="url(#metal-v)" stroke="#0a0a0a" stroke-width="1"/>

    <!-- ===== LOWER LEATHERETTE (hosts on-camera keyframe UI) ===== -->
    <rect x="118" y="620" width="464" height="196" rx="32" fill="url(#leather)" stroke="#0a0a0a" stroke-width="2"/>
    <rect x="126" y="628" width="448" height="180" rx="26" fill="none" stroke="#1e1e1e" stroke-width="1"/>
    <!-- Recessed film deck plate for timeline -->
    <rect x="140" y="648" width="420" height="140" rx="16" fill="#0a0a0a" stroke="#111" stroke-width="1.25" opacity="0.55"/>
  </g>
</svg>

