<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 920" fill="none" aria-hidden="true">
  <!--
    Viewfinder composition guides only (grid + center target).
    Same viewBox as camera-viewfinder-overlay.svg.
    Hole: x=140 y=168 w=420 h=420  center 350,378
  -->
  <g id="guides" fill="none" stroke="#fff" stroke-linecap="round">
    <!-- Rule-of-thirds ticks -->
    <g stroke-width="1.25" opacity="0.85">
      <line x1="280" y1="200" x2="280" y2="214"/><line x1="280" y1="542" x2="280" y2="556"/>
      <line x1="420" y1="200" x2="420" y2="214"/><line x1="420" y1="542" x2="420" y2="556"/>
      <line x1="162" y1="308" x2="176" y2="308"/><line x1="524" y1="308" x2="538" y2="308"/>
      <line x1="162" y1="448" x2="176" y2="448"/><line x1="524" y1="448" x2="538" y2="448"/>
      <g stroke-width="1.4">
        <path d="M274 308 h12 M280 302 v12"/>
        <path d="M414 308 h12 M420 302 v12"/>
        <path d="M274 448 h12 M280 442 v12"/>
        <path d="M414 448 h12 M420 442 v12"/>
      </g>
    </g>

    <!-- Center crosshair + circle -->
    <g stroke-width="1.6" opacity="0.95">
      <circle cx="350" cy="378" r="32"/>
      <line x1="350" y1="332" x2="350" y2="354"/>
      <line x1="350" y1="402" x2="350" y2="424"/>
      <line x1="304" y1="378" x2="326" y2="378"/>
      <line x1="374" y1="378" x2="396" y2="378"/>
      <circle cx="350" cy="378" r="2.5" fill="#fff" stroke="none"/>
    </g>

    <!-- Corner brackets -->
    <g stroke-width="2" opacity="0.9">
      <path d="M160 188 h24 M160 188 v24"/>
      <path d="M540 188 h-24 M540 188 v24"/>
      <path d="M160 568 h24 M160 568 v-24"/>
      <path d="M540 568 h-24 M540 568 v-24"/>
    </g>
  </g>
</svg>
